<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="silver">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#031026"/>
      <stop offset="100%" stop-color="#2b0836"/>
    </linearGradient>

    <linearGradient id="metalGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#d9dee6"/>
      <stop offset="70%" stop-color="#9aa6b4"/>
      <stop offset="100%" stop-color="#6b7480"/>
    </linearGradient>

    <filter id="ds" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#bgGrad)" />
  <rect x="6" y="6" width="52" height="52" rx="9" fill="#071018" opacity="0.35" />
  <rect x="6" y="6" width="52" height="52" rx="9" fill="url(#metalGrad)" opacity="0.06" />

  <!-- Shadow base for stronger contrast -->
  <text x="32" y="42" text-anchor="middle" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-weight="900" font-size="20" letter-spacing="-0.2" fill="rgba(0,0,0,0.75)" filter="url(#ds)">silver</text>

  <!-- Bright metallic label -->
  <text x="32" y="38" text-anchor="middle" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-weight="900" font-size="20" letter-spacing="-0.2" fill="url(#metalGrad)" stroke="#0b1220" stroke-width="0.8">silver</text>

</svg>
